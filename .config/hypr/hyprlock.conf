# BACKGROUND
background {
    monitor =
    path = ~/.config/hypr/wallpaper.jpg # <- change this to your own wallpaper
    blur_passes = 2
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# INPUT FIELD
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(100, 114, 125, 0.5)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = Google Sans Flex
    placeholder_text = <span foreground="##ffffff99">Hi, $USER</span>
    hide_input = false
    position = 0, -350
    halign = center
    valign = center
}

# clock
label {
    monitor =
    text = cmd[update:1000] echo -e "<span color='##cdd6f499'>$(date +"%H:")</span><span color='##9399b299'>$(date +"%M")</span>"
    color = rgba(255, 255, 255, .6)
    font_size = 380
    font_family = Steelfish rg
    position = 0, 200
    halign = center
    valign = center
}

# Day-Date-Month
label {
    monitor =
    text = cmd[update:1000] echo "<span color='##ffffff99'>$(date '+%A, ')$(date '+%d %B')</span>"
    font_size = 30
    font_family = Google Sans Flex Medium
    position = 0, 450
    halign = center
    valign = center
}
