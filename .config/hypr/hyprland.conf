
################
### MONITORS ###
################

monitor = eDP-1, 1920x1080@144, 0x0, 1

source = ~/.config/hypr/colors/mocha.conf
###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = nautilus
$browser = firefox
$launcher = pkill rofi || .config/rofi/launchers/launcher.sh


#################
## AUTOSTART ###
#################

exec-once = hyprctl setcursor Bibata-Modern-Classic 24
exec-once = hyprlock
# exec-once = nm-applet &
exec-once = waybar
exec-once = swaync
exec-once = awww-daemon

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

###################
### PERMISSIONS ###
###################

ecosystem:enforce_permissions = true

permission = /usr/(bin|local/bin)/grim, screencopy, allow
permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
permission = /usr/(bin|local/bin)/hyprpm, plugin, allow
permission = /usr/bin/hyprlock, screencopy, allow

cursor {
  no_hardware_cursors = 1
}

#####################
### LOOK AND FEEL ###
#####################

general {
  gaps_in = 7
  gaps_out = 7
  
  border_size = 2

  col.active_border = $overlay2
  col.inactive_border = $surface1

}

layerrule {
    name = waybar
    match:namespace = waybar
    blur = true
    ignore_alpha = 0.01
}

layerrule {
    name = wlogout
    match:namespace = logout_dialog
    blur = true
    ignore_alpha = 0.01
}

layerrule {
    name = swaync-control-center
    match:namespace = swaync-control-center
    blur = true
    ignore_alpha = 0.5
}

layerrule {
    name = swaync-notifications
    match:namespace = swaync-notifications
    blur = true
    ignore_alpha = 0.5
}

layerrule {
    name = rofi
    match:namespace = rofi
    blur = on
    ignore_alpha = 0.01
} 

decoration {
  rounding = 23
  rounding_power = 2

  shadow {
    enabled = true
    range = 3
    render_power = 2
    color = rgba(0a1a1aee)
  }

  blur {
        enabled = true
        xray = true
        special = false
        new_optimizations = true
        size = 10
        passes = 3
        brightness = 1
        noise = 0.05
        contrast = 0.89
        vibrancy = 0.5
        vibrancy_darkness = 0.5
        popups = false
        popups_ignorealpha = 0.6
        input_methods = true
        input_methods_ignorealpha = 0.8
  }
}

animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeOutQuart, 0.25, 1, 0.5, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, popin 87%
    animation = layersOut,     1,     1.5,   linear,       popin 87%
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     5.94,  easeOutQuart, slide
    animation = workspacesIn,  1,     5.21,  easeOutQuart, slide
    animation = workspacesOut, 1,     5.94,  easeOutQuart, slide
    animation = zoomFactor,    1,     7,     quick


}

layerrule = animation slide right, match:namespace ^(swaync-control-center)$
layerrule = animation slide, match:namespace ^(rofi)$
layerrule = animation fade, match:namespace ^(logout_dialog)$
